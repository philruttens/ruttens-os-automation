<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #1a1a2e; font-size: 14px; min-height: 100vh; }

/* Header */
.hdr { background: #0f0f1a; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 3px solid #38B6FF; }
.hdr-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.hdr-sub { font-size: 11px; color: #88aacc; margin-top: 2px; }
.hdr-stats { margin-left: auto; display: flex; gap: 16px; text-align: right; }
.hdr-stat { font-size: 12px; color: #aac; }
.hdr-stat strong { color: #fff; font-size: 16px; display: block; }

/* Stats bar */
.stats-bar { background: #fff; border-bottom: 1px solid #e2e4e9; padding: 8px 20px; display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
.sstat { font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px; }
.sstat strong { color: #1a1a2e; font-weight: 600; }
.sstat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* Controls */
.controls { background: #fff; border-bottom: 1px solid #e2e4e9; padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.ctrl-group { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
select, input[type=text] { border: 1px solid #d0d4dd; border-radius: 6px; padding: 6px 10px; font-size: 12px; background: #fff; color: #1a1a2e; height: 32px; }
select:focus, input[type=text]:focus { outline: none; border-color: #38B6FF; box-shadow: 0 0 0 2px rgba(56,182,255,0.15); }
input.search { min-width: 180px; flex: 1; }
.show-watched-label { font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; padding: 6px 10px; border: 1px solid #d0d4dd; border-radius: 6px; background: #fff; height: 32px; user-select: none; }
.show-watched-label:hover { background: #f4f5f7; }
.show-watched-label input { cursor: pointer; accent-color: #38B6FF; }

/* Tabs */
.tabs { background: #fff; border-bottom: 1px solid #e2e4e9; padding: 0 20px; display: flex; gap: 2px; overflow-x: auto; }
.tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: #777; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: #38B6FF; }
.tab.active { color: #38B6FF; border-bottom-color: #38B6FF; }
.tab.tab-rejected.active { color: #E63946; border-bottom-color: #E63946; }
.tab.tab-rejected:hover { color: #E63946; }

/* Content */
.content { padding: 16px 20px 24px; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 10px; margin-top: 18px; }
.section-label:first-child { margin-top: 0; }

/* Table */
.tbl-wrap { background: #fff; border-radius: 8px; border: 1px solid #e2e4e9; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead { background: #f8f9fb; }
th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #e2e4e9; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { background: #eef0f4; color: #38B6FF; }
th.no-sort { cursor: default; }
th.no-sort:hover { background: #f8f9fb; color: #666; }
th .sort-icon { margin-left: 3px; opacity: 0.4; font-size: 9px; }
th.sorted .sort-icon { opacity: 1; color: #38B6FF; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f1f5; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfd; }
tr.is-watched td { opacity: 0.45; }
tr.is-watched td .title-cell { text-decoration: line-through; }
tr.is-rejected td { opacity: 0.35; background: #fff8f8; }
tr.is-rejected td .title-cell { color: #999; }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; line-height: 16px; }
.b-movie    { background: #EDF2FF; color: #3B5BDB; }
.b-series   { background: #FFF4E6; color: #D9480F; }
.b-weekly   { background: #EBFBEE; color: #2B8A3E; }
.b-watchlist { background: #F3F0FF; color: #5C37A8; }

/* Platform chips */
.plat { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.p-netflix  { background: #E50914; color: #fff; }
.p-prime    { background: #00A8E1; color: #fff; }
.p-appletv  { background: #1c1c1e; color: #fff; }
.p-hbomax   { background: #5822FF; color: #fff; }
.p-vrtmax   { background: #009B77; color: #fff; }
.p-other    { background: #6c757d; color: #fff; }

/* RT score */
.rt { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; min-width: 42px; text-align: center; }
.rt-hi  { background: #D3F9D8; color: #1B4332; }
.rt-mid { background: #FFF3BF; color: #744210; }
.rt-lo  { background: #FFE3E3; color: #742A2A; }
.rt-na  { background: #E9ECEF; color: #868E96; }

/* IMDb */
.imdb { font-size: 12px; font-weight: 600; color: #333; }
.imdb-na { color: #bbb; }

/* NEW badge */
.new-tag { background: #FF3B30; color: #fff; font-size: 9px; padding: 1px 4px; border-radius: 6px; margin-left: 4px; font-weight: 800; vertical-align: middle; letter-spacing: 0.3px; }

/* Action column — watched checkbox + reject button */
.action-col { display: flex; align-items: center; gap: 5px; justify-content: center; }
.watched-cb { width: 16px; height: 16px; cursor: pointer; accent-color: #38B6FF; flex-shrink: 0; }
.reject-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #ccc; padding: 0 1px; line-height: 1; border-radius: 3px; flex-shrink: 0; transition: color 0.12s, background 0.12s; }
.reject-btn:hover { color: #E63946; background: #FFE8E8; border-radius: 3px; }
.reject-btn.is-rejected { color: #E63946; font-weight: 900; }
.unreject-btn { background: #FFE8E8; border: 1px solid #E63946; color: #E63946; font-size: 11px; cursor: pointer; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
.unreject-btn:hover { background: #E63946; color: #fff; }

/* Title cell */
.title-cell { font-weight: 500; color: #1a1a2e; }
.notes-cell { font-size: 11px; color: #888; margin-top: 2px; }

/* Empty */
.empty { text-align: center; padding: 36px 20px; color: #aaa; font-size: 13px; }
.empty strong { display: block; font-size: 16px; margin-bottom: 6px; color: #ccc; }

/* Archive / Rejected section headers */
.archive-header { display: flex; align-items: center; gap: 8px; margin-top: 20px; margin-bottom: 10px; }
.archive-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #888; }
.archive-count { background: #e2e4e9; color: #666; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.rejected-header .archive-title { color: #E63946; }
.rejected-header .archive-count { background: #FFE8E8; color: #E63946; }
</style>

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let watched  = new Set(JSON.parse(localStorage.getItem(LS_WATCHED)  || '[]'));
let rejected = new Set(JSON.parse(localStorage.getItem(LS_REJECTED) || '[]'));
let activeTab = 'all';
let sortKey = null;
let sortDir = 1;

function saveWatched()  { localStorage.setItem(LS_WATCHED,  JSON.stringify([...watched])); }
function saveRejected() { localStorage.setItem(LS_REJECTED, JSON.stringify([...rejected])); }

// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function platClass(p) {
  return { 'Netflix':'p-netflix','Prime':'p-prime','Apple TV+':'p-appletv','HBO Max':'p-hbomax','VRT Max':'p-vrtmax' }[p] || 'p-other';
}
function rtClass(v) {
  if (v===null) return 'rt-na';
  return v>=80?'rt-hi':v>=60?'rt-mid':'rt-lo';
}
function rtText(v) { return v!==null ? v+'%' : '–'; }
function typeLabel(t) {
  return t==='Series'
    ? '<span class="badge b-series">Series</span>'
    : '<span class="badge b-movie">Movie</span>';
}
function sourceLabel(s) {
  return s==='weekly'
    ? '<span class="badge b-weekly">📅 Weekly</span>'
    : '<span class="badge b-watchlist">📋 Watchlist</span>';
}

// ─────────────────────────────────────────────────────────────
// Filter
// ─────────────────────────────────────────────────────────────
function getFiltered(mode) {
  // mode: 'main' | 'archive' | 'rejected'
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const fType     = document.getElementById('filterType').value;
  const fPlatform = document.getElementById('filterPlatform').value;
  const fSource   = document.getElementById('filterSource').value;
  const fRT       = document.getElementById('filterRT').value;
  const showW     = document.getElementById('showWatched').checked;

  return TITLES.filter(r => {
    const isW = watched.has(r.id);
    const isR = rejected.has(r.id);

    if (mode === 'archive')  return isW && !isR;
    if (mode === 'rejected') return isR;

    // main views — hide rejected always
    if (isR) return false;
    if (isW && !showW) return false;

    if (activeTab === 'weekly'    && r.source !== 'weekly')    return false;
    if (activeTab === 'watchlist' && r.source !== 'watchlist') return false;

    if (search && !r.title.toLowerCase().includes(search) && !(r.notes||'').toLowerCase().includes(search)) return false;
    if (fType     && r.type     !== fType)     return false;
    if (fPlatform && r.platform !== fPlatform) return false;
    if (fSource   && r.source   !== fSource)   return false;
    if (fRT === 'hi'  && (r.rt===null || r.rt<80))            return false;
    if (fRT === 'mid' && (r.rt===null || r.rt<60 || r.rt>=80))return false;
    if (fRT === 'lo'  && (r.rt===null || r.rt>=60))           return false;
    if (fRT === 'na'  && r.rt!==null)                         return false;

    return true;
  });
}

function sortData(data) {
  if (!sortKey) return data;
  return [...data].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    const nullDir = sortDir === 1 ? -9999 : 9999;
    if (av===null||av===undefined) av = nullDir;
    if (bv===null||bv===undefined) bv = nullDir;
    if (typeof av==='string') av=av.toLowerCase();
    if (typeof bv==='string') bv=bv.toLowerCase();
    if (av<bv) return -sortDir;
    if (av>bv) return sortDir;
    return 0;
  });
}

// ─────────────────────────────────────────────────────────────
// Build table
// ─────────────────────────────────────────────────────────────
const COLS = [
  { key:null,       label:'Actions', nosort:true  },
  { key:'title',    label:'Title'                 },
  { key:'type',     label:'Type'                  },
  { key:'platform', label:'Platform'              },
  { key:'season',   label:'Season / Notes'        },
  { key:'rt',       label:'RT %'                  },
  { key:'imdb',     label:'IMDb'                  },
  { key:'source',   label:'Source'                },
];

function buildTable(data, inRejectedTab) {
  if (!data.length) {
    return '<div class="empty"><strong>Nothing here</strong>No titles match your filters</div>';
  }

  const thead = '<thead><tr>' + COLS.map(c => {
    if (c.nosort) return `<th class="no-sort" style="width:68px">${c.label}</th>`;
    const active = sortKey===c.key ? ' sorted' : '';
    const icon   = sortKey===c.key ? (sortDir===1?'▲':'▼') : '⇅';
    return `<th class="${active}" onclick="doSort('${c.key}')">${c.label} <span class="sort-icon">${icon}</span></th>`;
  }).join('') + '</tr></thead>';

  const rows = data.map(r => {
    const isW = watched.has(r.id);
    const isR = rejected.has(r.id);
    let rowClass = '';
    if (isW) rowClass = ' class="is-watched"';
    if (isR) rowClass = ' class="is-rejected"';

    const newTag  = r.isNew ? '<span class="new-tag">NEW</span>' : '';
    const notesTxt = r.notes ? `<div class="notes-cell">${r.notes}</div>` : '';
    const imdbHtml = r.imdb!==null
      ? `<span class="imdb">${r.imdb}</span><span style="font-size:10px;color:#bbb"> /10</span>`
      : '<span class="imdb-na">–</span>';

    const rejectClass = isR ? ' is-rejected' : '';
    const rejectTitle = isR ? 'Un-reject' : 'Reject (hide from list)';

    const actionCol = inRejectedTab
      ? `<td style="width:68px;text-align:center"><button class="unreject-btn" onclick="toggleR('${r.id}')">↩ Restore</button></td>`
      : `<td style="width:68px"><div class="action-col">
           <input type="checkbox" class="watched-cb" ${isW?'checked':''} onchange="toggleW('${r.id}')">
           <button class="reject-btn${rejectClass}" onclick="toggleR('${r.id}')" title="${rejectTitle}">✕</button>
         </div></td>`;

    return `<tr${rowClass}>
      ${actionCol}
      <td><div class="title-cell">${r.title}${newTag}</div>${notesTxt}</td>
      <td>${typeLabel(r.type)}</td>
      <td><span class="plat ${platClass(r.platform)}">${r.platform}</span></td>
      <td style="font-size:12px;color:#666">${r.season||''}</td>
      <td><span class="rt ${rtClass(r.rt)}">${rtText(r.rt)}</span></td>
      <td>${imdbHtml}</td>
      <td>${sourceLabel(r.source)}</td>
    </tr>`;
  }).join('');

  return `<div class="tbl-wrap"><table>${thead}<tbody>${rows}</tbody></table></div>`;
}

// ─────────────────────────────────────────────────────────────
// Full render
// ─────────────────────────────────────────────────────────────
function render() {
  const total   = TITLES.length;
  const nSeries = TITLES.filter(r=>r.type==='Series').length;
  const nMovies = TITLES.filter(r=>r.type==='Movie').length;
  const nWeekly = TITLES.filter(r=>r.source==='weekly').length;
  const nW      = watched.size;
  const nR      = rejected.size;
  const pct     = Math.round(nW/total*100);

  document.getElementById('hdrStats').innerHTML = `
    <div class="hdr-stat"><strong>${total}</strong> total</div>
    <div class="hdr-stat"><strong>${nW}</strong> watched</div>
    <div class="hdr-stat"><strong>${nR}</strong> rejected</div>
  `;
  document.getElementById('statsBar').innerHTML = `
    <div class="sstat"><span class="sstat-dot" style="background:#3B5BDB"></span>Series <strong>${nSeries}</strong></div>
    <div class="sstat"><span class="sstat-dot" style="background:#D9480F"></span>Movies <strong>${nMovies}</strong></div>
    <div class="sstat"><span class="sstat-dot" style="background:#2B8A3E"></span>Weekly picks <strong>${nWeekly}</strong></div>
    <div class="sstat"><span class="sstat-dot" style="background:#38B6FF"></span>Watched <strong>${nW}/${total-nR}</strong> (${pct}%)</div>
    <div class="sstat"><span class="sstat-dot" style="background:#E63946"></span>Rejected <strong>${nR}</strong></div>
    <div class="sstat" style="margin-left:auto;font-size:11px;color:#bbb">Updated 12/06/2026</div>
  `;

  const content = document.getElementById('mainContent');

  if (activeTab === 'archive') {
    const data = sortData(getFiltered('archive'));
    if (!data.length) {
      content.innerHTML = '<div class="empty"><strong>No archived titles yet</strong>Check the ✓ checkbox on any title to archive it here</div>';
    } else {
      content.innerHTML = `
        <div class="archive-header">
          <div class="archive-title">✅ Watched Archive</div>
          <div class="archive-count">${data.length}</div>
        </div>
        ${buildTable(data, false)}
      `;
    }
    return;
  }

  if (activeTab === 'rejected') {
    const data = sortData(getFiltered('rejected'));
    if (!data.length) {
      content.innerHTML = '<div class="empty"><strong>No rejected titles</strong>Click the ✕ button on any title to move it here</div>';
    } else {
      content.innerHTML = `
        <div class="archive-header rejected-header">
          <div class="archive-title">🚫 Rejected</div>
          <div class="archive-count">${data.length}</div>
        </div>
        <div style="font-size:12px;color:#999;margin-bottom:12px">Click ↩ Restore to move back to the main list</div>
        ${buildTable(data, true)}
      `;
    }
    return;
  }

  const data = sortData(getFiltered('main'));

  if (activeTab === 'weekly') {
    const series = data.filter(r=>r.type==='Series');
    const movies = data.filter(r=>r.type==='Movie');
    let html = '';
    if (series.length) html += `<div class="section-label">📺 Top 5 Series — Week of 11/06/2026</div>${buildTable(series, false)}`;
    if (movies.length) html += `<div class="section-label">🎬 Top 5 Movies — Week of 11/06/2026</div>${buildTable(movies, false)}`;
    if (!html) html = '<div class="empty"><strong>No results</strong>Adjust your filters</div>';
    content.innerHTML = html;
    return;
  }

  if (!data.length) {
    content.innerHTML = '<div class="empty"><strong>No results</strong>Adjust your filters or enable "Show watched"</div>';
    return;
  }

  content.innerHTML = `<div class="section-label">${data.length} title${data.length!==1?'s':''}</div>${buildTable(data, false)}`;
}

// ─────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────
function toggleW(id) {
  if (watched.has(id)) watched.delete(id);
  else {
    watched.add(id);
    rejected.delete(id); // can't be both
    saveRejected();
  }
  saveWatched();
  render();
}

function toggleR(id) {
  if (rejected.has(id)) rejected.delete(id);
  else {
    rejected.add(id);
    watched.delete(id); // can't be both
    saveWatched();
  }
  saveRejected();
  render();
}

function doSort(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  render();
}

// ─────────────────────────────────────────────────────────────
// Tab + filter listeners
// ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

['searchInput','filterType','filterPlatform','filterSource','filterRT','showWatched'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('change', render);
  if (id==='searchInput') el.addEventListener('input', render);
});

render();
</script>
