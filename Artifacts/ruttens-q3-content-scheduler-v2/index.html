{id:'spf-1',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/CRO',hook:'Most GTM strategies need SPF 50. They\'re running on SPF 8.',caption:`Most GTM strategies need SPF 50.\n\nThey're running on SPF 8.\n\nYou know the feeling. Big summer energy in May. Optimistic forecast. Then July hits — deals slow, inboxes go quiet, pipeline stalls.\n\nIt's not the season. It's the gaps you didn't fix in June.\n\nI do 30-minute pre-summer GTM scans. We find the leaks, pressure-test your pipeline, and make sure Q3 actually closes.\n\nIf you're heading into summer with any of these, let's talk:\n→ ICP that's still "broadly defined"\n→ Sales and marketing not talking the same language\n→ Deals stuck at proposal stage since March\n→ Attribution that makes no sense\n\nruttens.com/summer-scan — book a free 30-min scan before you log off.\n\n#GTM #B2BSales #FractionalCMO #PipelineHealth #Q3`,visualNote:'Attach: Banner A (Navy 1584×396) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'spf-2',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/CRO',hook:'SPF 8 feels fine — until it doesn\'t. Same with GTM strategy.',caption:`SPF 8 feels fine — until it doesn't.\n\nSame with GTM strategy.\n\nMost B2B teams head into summer thinking they're covered. Decent pipeline. Reasonable forecast. Good enough messaging.\n\nThen September arrives and the numbers don't.\n\nThe fix is usually not a big programme. It's 3–4 specific gaps:\n— the ICP that was never crisp enough to run hard campaigns on\n— the enablement that never landed with the reps\n— the follow-up sequence that dies after email 2\n— the positioning that describes what you do, not why it matters\n\n30 minutes. I'll tell you exactly what's leaking.\n\n→ ruttens.com/summer-scan\n\n#RevOps #GTMStrategy #B2B #FractionalCMO #PreSummerScan`,visualNote:'Attach: Banner E (Black 1584×396) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'spf-3',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Sales',hook:'Hot take: summer isn\'t the problem. Your GTM is.',caption:`Hot take: summer isn't the problem. Your GTM is.\n\nPipeline doesn't slow down because of the season.\nIt slows down because July exposes what June was hiding.\n\nI've seen it across 40+ B2B scale-ups. The teams that close Q3 strong aren't the ones who hustled harder in August. They're the ones who fixed the gaps in June.\n\nSpecifically:\n✓ They knew exactly who they were chasing (not "SMB and enterprise")\n✓ Their reps had crisp objection handles, not decks\n✓ Their nurture didn't go silent after proposal\n✓ They had a plan B when the champion went on holiday\n\nI run a 30-minute scan. No slides, no fluff — just: here's what's going to hurt you in Q3, here's the fix.\n\nStill 2 spots this week.\n\nruttens.com/summer-scan\n\n#GTM #RevenueOperations #B2BSaas #CMO #SummerPipeline`,visualNote:'Attach: Banner F (Yellow 1584×396) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'split-1',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Marketing',hook:'Summer is for terraces. September is for targets.',caption:`Summer is for terraces.\nSeptember is for targets.\n\nI handle the second one.\n\nMost GTM leaders know exactly what they want Q3 to look like in September. The question is what they're doing about it in June.\n\nA 30-minute pre-summer scan covers:\n→ Where your pipeline is quietly leaking\n→ Which ICP segments are actually worth running hard campaigns on right now\n→ Whether your sales and marketing are really aligned (not "aligned on paper")\n→ What one thing, if fixed before July, changes your Q3 trajectory\n\nEnjoy the terrace. I'll make sure September delivers.\n\nruttens.com/summer-scan — free, 30 minutes, no pitch deck.\n\n#GTMStrategy #B2BMarketing #FractionalCMO #Q3Planning #SummerScan`,visualNote:'Attach: Banner C1 (Split Navy+Blue) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'split-2',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/VP Sales',hook:'Summer is for ice cream. September is for ICPs. I handle the second one.',caption:`Summer is for ice cream.\nSeptember is for ICPs.\n\nI handle the second one. 😏\n\nHere's the thing nobody says out loud: most B2B companies don't actually have a crisp ICP. They have a wishlist dressed up as a segment.\n\n"We target scale-ups between 50 and 500 people in SaaS."\n\nThat's not an ICP. That's 40,000 companies.\n\nA real ICP tells you:\n— which 200 accounts you should be running signals-based outreach on right now\n— which industries have the buying cycles that match your summer-to-Q3 timeline\n— which titles actually have budget sign-off (not just influence)\n\nYou can sort this in June. Or you can sort it in October, after Q3.\n\nruttens.com/summer-scan\n\n#ICP #ABM #GTMStrategy #B2BMarketing #FractionalCMO`,visualNote:'Attach: Banner C2 (Split Navy+Blue) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'split-3',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Revenue',hook:'Summer is for recharging. September is for revenue. Both should happen.',caption:`Summer is for recharging.\nSeptember is for revenue.\n\nBoth should happen. Most teams only plan for one.\n\nI speak to a lot of revenue leaders in June. The good ones are already thinking about September. They want to close the summer knowing the Q3 machine is set up to run.\n\nWhat that actually means:\n✓ Pipeline that was qualified, not just logged\n✓ Messaging that's been tightened since the spring\n✓ A nurture sequence that doesn't die in August\n✓ Sales reps who know exactly what to say when champions go dark\n\nRecharge properly. I'll make sure the revenue piece is covered.\n\nFree 30-min scan → ruttens.com/summer-scan\n\n#RevenueLeaders #GTM #CMO #B2BGrowth #Q3`,visualNote:'Attach: Banner C3 (Split Navy+Blue) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'split-4',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/CFO',hook:'Good summer. Bad Q3. Not a coincidence.',caption:`Good summer. Bad Q3.\n\nNot a coincidence.\n\nTeams that have a great June and July — team off-sites, relaxed pipeline reviews, "we'll push hard in August" — almost always struggle in September.\n\nNot because they rested. Because they didn't fix things when there was still time.\n\nThe pattern is predictable:\n→ June: pipeline looks fine on paper, no one digs in\n→ July: everyone half-present, no real decisions made\n→ August: panic mode, discounting, chasing anything warm\n→ September: the numbers don't close\n\nOne conversation in June changes this. 30 minutes to find the gaps while you can still do something about them.\n\nruttens.com/summer-scan\n\n#GTM #Q3 #RevenueOps #B2B #FractionalCMO`,visualNote:'Attach: Banner D (Navy + Yellow) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'heatwave-1',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Marketing',hook:'Your GTM is overheating. Most companies don\'t notice until September.',caption:`Your GTM is overheating. 🌡️\n\nMost companies don't notice until September.\n\nThe signs are there in June if you know what to look for:\n— Win rates dropping but nobody's reviewing calls\n— Marketing and sales blaming each other for the pipeline miss\n— Messaging still built around the product launch from 18 months ago\n— Champions going quiet and reps not knowing why\n\nI do the diagnosis. 30 minutes, free, before you head off for summer.\n\nYou wouldn't skip an MOT before a long drive. Don't skip a GTM scan before Q3.\n\nruttens.com/summer-scan\n\n#GTMDiagnosis #B2B #HeatwaveGTM #FractionalCMO #RevenueHealth`,visualNote:'Attach: Banner G (Heatwave Orange) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'heatwave-2',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CRO/VP Sales',hook:'Pipeline melts in July if you don\'t move now. Harsh? A little. True? Completely.',caption:`Pipeline melts in July if you don't move now.\n\nHarsh? A little. True? Completely.\n\nHere's what actually happens to unprotected pipeline in summer:\n🔥 Champions go on holiday — deals pause, never restart\n🔥 Buying committees disperse — consensus resets\n🔥 Competitors who stayed sharp move into your accounts\n🔥 Momentum built in spring evaporates in August heat\n\nThe fix is not heroics. It's clarity — before July.\n\nCrisp next steps on every live deal. Champions briefed. Internal champions identified. A nurture that keeps you warm without being annoying.\n\n30 minutes now. Proper Q3 pipeline in September.\n\nruttens.com/summer-scan\n\n#PipelineManagement #B2BSales #GTM #SummerPipeline #RevOps`,visualNote:'Attach: Banner H (Heatwave Black+Orange) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'heatwave-3',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/CRO',hook:'Your Q3 is running a fever. The symptoms are clear if you know what to look for.',caption:`Your Q3 is running a fever. 🤒\n\nThe symptoms:\n— Pipeline that looked healthy in May is looking shaky in June\n— You're not sure if marketing is actually moving deals or just creating noise\n— Your ICP was defined in a workshop 18 months ago and nobody's questioned it since\n— The board wants a Q3 number you don't fully believe in\n\nThis isn't a forecast problem. It's a GTM health problem.\n\nI'm a fractional CMO and AI GTM Orchestrator. I do 30-minute pre-summer scans for B2B scale-ups. We identify the fever, trace it to the root, and you leave with a clear prescription — not a report, a fix.\n\nStill a few spots left before July.\n\nruttens.com/summer-scan\n\n#GTM #B2BMarketing #FractionalCMO #Q3Recovery #RevenueHealth`,visualNote:'Attach: Banner I (Heatwave Split Orange+Navy) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'square-1',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Sales',hook:'Most GTM strategies are running on SPF 8. They think they\'re covered. They\'re not.',caption:`Most GTM strategies are running on SPF 8.\n\nThey think they're covered. They're not.\n\nThe teams who close Q3 strong didn't get lucky in September. They did this in June:\n\n1. Tightened their ICP to the 200 accounts most likely to close in 90 days\n2. Ran a ruthless pipeline review — anything with no next step got cut or re-engaged\n3. Fixed the messaging gap between what sales says and what marketing puts out\n4. Built a summer nurture that kept them warm without spamming\n\nYou can do all of this in a 30-minute conversation.\n\nI call it a pre-summer scan. It's free. It's sharp. And it's the difference between a good summer AND a strong Q3.\n\n→ ruttens.com/summer-scan\n\n#GTM #B2B #Q3Planning #FractionalCMO`,visualNote:'Attach: Square Post 1 (1080×1080) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'square-2',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/CRO',hook:'Do you want a summer tan, sir? Or a scan with your summer tan?',caption:`Do you want a summer tan, sir?\n\nOr a scan with your summer tan? ☀️\n\n(You can have both. The scan takes 30 minutes. The tan takes the rest of July.)\n\nFractional CMO + AI GTM Orchestrator for B2B scale-ups who want a strong Q3, not just a nice summer.\n\nWhat I look at in a pre-summer scan:\n— Pipeline quality (not just quantity)\n— ICP clarity (real signals, not personas)\n— Sales-marketing alignment (real, not theoretical)\n— The 1–2 things most likely to quietly kill your Q3 if you ignore them now\n\nFree. 30 minutes. No deck, no pitch — just a straight answer.\n\nruttens.com/summer-scan\n\n#GTM #B2BMarketing #SummerScan #FractionalCMO #AskMeAnything`,visualNote:'Attach: Square Post 2 (1080×1080) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'build-1',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CEO/CMO/VP Sales',hook:'Your clients are off in July. That\'s not downtime. That\'s your build window.',caption:`Your clients are off in July.\n\nThat's not downtime. That's your build window.\n\nMost consultants and fractional CMOs slow down when clients go quiet. The sharp ones do the opposite.\n\nJuly and early August are the best weeks of the year to:\n→ Audit what actually worked in H1 (honestly, not politically)\n→ Rebuild your ICP from signals, not assumptions\n→ Set up the AI GTM systems that make Q3 run on autopilot\n→ Build the outreach sequences, content pipeline, and nurture flows that will be waiting when inboxes reopen\n→ Identify the 20 accounts most likely to close before Christmas\n\nBy the time your clients come back mid-August, you're not "catching up." You're ready.\n\nI work with B2B scale-ups to build the GTM machine during the quiet months — so September feels like a launch, not a scramble.\n\nruttens.com/summer-scan — let's use July well.\n\n#GTM #FractionalCMO #AIGTMOrchestrator #Q3Planning #BuildSeason`,visualNote:'Attach: Banner J (Split Navy+Blue) | Pair with: SPF Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'build-2',tab:'summer-scan',type:'image',date:'Unscheduled',icp:'CMO/CRO/VP Marketing',hook:'July is for building. September is for billing. Most get it backwards.',caption:`July is for building.\nSeptember is for billing.\n\nThis is the sequence most B2B scale-ups get backwards.\n\nThey treat July as a write-off — team scattered, clients on holiday, pipeline stalled. Then they scramble in August and wonder why Q3 doesn't close.\n\nThe ones who get it right do this in July while the world is quiet:\n\n✓ They clean and rebuild their ICP — real account-level signals, not segment assumptions\n✓ They install the AI GTM systems that run outreach, scoring, and nurture without headcount\n✓ They write the Q3 content in advance so the machine is loaded when clients return\n✓ They set up the workflows that make mid-August reactivation feel effortless\n\nI build this with you. The quiet weeks. The right systems. So when your clients come back from Tuscany, your pipeline is already warm.\n\nThat's the July job. September handles itself.\n\nruttens.com/summer-scan\n\n#AIGTMOrchestrator #B2BGrowth #FractionalCMO #BuildSeason #Q3Strategy`,visualNote:'Attach: Banner K (Navy + Yellow) | Pair with: Evidence Carousel PDF',cta:'ruttens.com/summer-scan'},
{id:'build-3',tab:'summer-scan',type:'text',date:'Unscheduled',icp:'CMO/CRO/VP Marketing',hook:'Mid-August is a very specific moment in B2B. Inboxes reopen. People are tanned, rested, and making decisions again.',caption:`Mid-August is a very specific moment in B2B.\n\nInboxes reopen. Out-of-office replies stop. People are tanned, rested, and — crucially — making decisions again.\n\nThe question is: who are they coming back to?\n\nThe consultants and CMOs they hear from first? The ones with something sharp and relevant waiting for them?\n\nOr the ones who went quiet in July and are now "getting back up to speed"?\n\nI use July to make sure my clients are in the first group.\n\nThe work is not heroic. It's systematic:\n— Reactivation sequences ready to go on August 12th\n— Content that's been written, reviewed, and scheduled\n— Account list refreshed with summer signals (who published, who hired, who announced)\n— A clear offer and message for the September conversation\n\nSummer doesn't have to be dead time.\nFor the right kind of client, it's the best investment window of the year.\n\nHappy to show you what that looks like for your business.\n\nruttens.com/summer-scan\n\n#B2BMarketing #FractionalCMO #MidAugust #GTMStrategy #AIGTMOrchestrator`,visualNote:'No visual — text-only post | Best published: early August',cta:'ruttens.com/summer-scan'},

caption:`Your CMO wants account-based marketing (ABM). Your CIO says no to new tools.

ABM doesn't require a dedicated platform. Most teams spend €40K+ on software before they've built the plays that would make it work.

→ A list of 20–50 named accounts with real intelligence — who to contact, what they care about, where they are in the buying cycle

ABM inside your Microsoft stack. Without the procurement conversation.

let activeTab = 'gtm-campaign';

function loadPublished() {
  try { PUBLISHED = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { PUBLISHED = {}; }
}
function savePublished() { localStorage.setItem(LS_KEY, JSON.stringify(PUBLISHED)); }
function getPostsForTab(tabId) { return ALL_POSTS.filter(p => p.tab === tabId && !PUBLISHED[p.id]); }
function getPublishedPosts() { return ALL_POSTS.filter(p => PUBLISHED[p.id]); }

function updateStats() {
  const pub = Object.keys(PUBLISHED).length;
  document.getElementById('total-count').textContent = ALL_POSTS.length;
  document.getElementById('published-count').textContent = pub;
  document.getElementById('pending-count').textContent = ALL_POSTS.length - pub;
}

function renderSidebar() {
  const pub = Object.keys(PUBLISHED).length;
  document.getElementById('sidebar-nav').innerHTML = TABS.map(tab => {
    const cnt = tab.special === 'published' ? pub
      : tab.placeholder ? 0
      : getPostsForTab(tab.id).length;
    const isActive = activeTab === tab.id;
    const isPubActive = tab.special === 'published' && pub > 0;
    return `<div class="nav-item${isActive?' active':''}${isPubActive?' nav-published-active':''}" onclick="switchTab('${tab.id}')">
      <span class="nav-icon">${tab.icon}</span>
      <span class="nav-label">${tab.label}</span>
      <span class="nav-count">${cnt}</span>
    </div>`;
  }).join('');
}

function typeBadge(type) {
  const m = {text:['type-text','Text'],image:['type-image','Image'],carousel:['type-carousel','Carousel'],sub:['type-sub','Substack'],ig:['type-ig','Instagram']};
  const [cls,lbl] = m[type]||['type-text',type];
  return `<span class="post-type-badge ${cls}">${lbl}</span>`;
}

function icpBadge(icp) {
  if (!icp) return '';
  const c = icpColor(icp);
  return `<span class="icp-badge" style="background:${c}1a;color:${c};border:1px solid ${c}33">${icp}</span>`;
}

function ctaLabel(cta) {
  if (!cta) return '';
  if (cta.includes('quiz')) return '🎯 Take the Quiz';
  if (cta.includes('free-tools')) return '🆓 Free Tools';
  if (cta.includes('pe-vc')) return '📊 PE/VC Page';
  if (cta.includes('tally')) return '📋 Book Now';
  if (cta.includes('cal.com')) return '📅 Book Call';
  return '🔗 Open Link';
}

function renderCard(post, inPublished) {
  const checked = !!PUBLISHED[post.id];
  const capId = 'cap-'+post.id;
  const longCap = post.caption.length > 220;
  return `<div class="post-card" id="card-${post.id}">
    <div class="post-card-header">
      <div class="post-checkbox${checked?' checked':''}" onclick="togglePublished('${post.id}')" title="${checked?'Move back to pending':'Mark as published'}"></div>
      <div class="post-meta">
        <div class="post-type-row">
          ${typeBadge(post.type)}
          ${icpBadge(post.icp)}
          ${post.date ? `<span class="post-date">${post.date}</span>` : ''}
        </div>
      </div>
    </div>
    <div class="post-hook">${post.hook}</div>
    <div class="post-caption${longCap ? '' : ' expanded'}" id="${capId}">${post.caption}</div>
    ${longCap ? `<button class="caption-toggle" onclick="toggleCap('${capId}',this)">Show full caption ▼</button>` : ''}
    <button class="copy-btn" id="cpybtn-${post.id}" onclick="copyPost('${post.id}')">📋 Copy caption</button>
    ${post.cta ? `<a class="cta-btn" href="https://${post.cta.replace(/^https?:\/\//,'')}" target="_blank">${ctaLabel(post.cta)}</a>` : ''}
    ${post.visualNote ? `<div class="visual-note"><strong>Visual:</strong> ${post.visualNote}</div>` : ''}
    <div class="post-footer">
      <span class="post-cta">${post.cta ? `<a href="https://${post.cta.replace(/^https?:\/\//,'')}" target="_blank">${post.cta}</a>` : ''}</span>
      <span class="post-id">#${post.id}</span>
      ${inPublished ? `<button class="uncheck-btn" onclick="togglePublished('${post.id}')">↩ Unpublish</button>` : ''}
    </div>
  </div>`;
}

function toggleCap(capId, btn) {
  const el = document.getElementById(capId);
  if (!el) return;
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    btn.textContent = 'Show full caption ▼';
  } else {
    el.classList.add('expanded');
    btn.textContent = 'Hide caption ▲';
  }
}

function copyPost(postId) {
  const post = ALL_POSTS.find(p => p.id === postId);
  if (!post) return;
  const btn = document.getElementById('cpybtn-'+postId);
  navigator.clipboard.writeText(post.caption).then(() => {
    if (btn) { btn.textContent = '✅ Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Copy caption'; btn.classList.remove('copied'); }, 2000); }
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = post.caption; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) { btn.textContent = '✅ Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Copy caption'; btn.classList.remove('copied'); }, 2000); }
  });
}

function togglePublished(postId) {
  if (PUBLISHED[postId]) { delete PUBLISHED[postId]; } else { PUBLISHED[postId] = true; }
  savePublished();
  renderAll();
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (activeTab === 'published') { renderPublished(main); return; }
  if (activeTab === 'quiz') { renderQuiz(main); return; }
  const tabInfo = TABS.find(t => t.id === activeTab);
  const posts = getPostsForTab(activeTab);
  main.innerHTML = `
    <div class="tab-header">
      <h2>${tabInfo ? tabInfo.icon+' '+tabInfo.label : activeTab}</h2>
      <p>${posts.length} post${posts.length!==1?'s':''} pending · Check a post to move it to Published</p>
    </div>
    <div class="posts-grid">
      ${posts.length > 0 ? posts.map(p=>renderCard(p,false)).join('') : `<p class="empty-tab">All posts published! 🎉</p>`}
    </div>`;
}

function renderPublished(main) {
  const posts = getPublishedPosts();
  if (posts.length === 0) {
    main.innerHTML = `<div class="tab-header"><h2>✅ Published</h2><p>Posts you've marked as published will appear here</p></div>
    <div class="published-empty"><div class="icon">📭</div><h3>Nothing published yet</h3><p>Check the box on any post card to mark it as published.<br>It will move here and disappear from its category tab.</p></div>`;
    return;
  }
  const grouped = {};
  posts.forEach(p => { if (!grouped[p.tab]) grouped[p.tab]=[]; grouped[p.tab].push(p); });
  let html = `<div class="tab-header"><h2>✅ Published (${posts.length})</h2><p>Click "Unpublish" to move a post back to its category tab</p></div>`;
  Object.entries(grouped).forEach(([tabId, tPosts]) => {
    const t = TABS.find(x => x.id === tabId);
    html += `<div class="section-label">${t ? t.icon+' '+t.label : tabId}</div>`;
    html += `<div class="posts-grid">${tPosts.map(p=>renderCard(p,true)).join('')}</div>`;
  });
  main.innerHTML = html;
}

function renderQuiz(main) {
  main.innerHTML = `<div class="tab-header"><h2>🎯 Team Quiz</h2><p>Placeholder — content to be added in a future session</p></div>
  <div class="placeholder-card">
    <div class="ph-icon">🎯</div>
    <h3>Team Quiz Content Coming Soon</h3>
    <p style="margin-top:8px;font-size:13px;color:var(--gray)">This tab is reserved for Team Quiz posts.<br>Content will be added in a separate Claude session.</p>
    <p style="margin-top:16px;font-size:11px;color:#4b5a6b">Possible content: quiz announcement posts · result series · ICP-specific quiz follow-ups · amplification posts</p>
  </div>`;
}

function renderAll() { renderSidebar(); renderMain(); updateStats(); }
function switchTab(id) { activeTab = id; renderAll(); }

loadPublished();
renderAll();
</script>
