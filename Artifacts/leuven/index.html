/* ═══════════════ STATE ═══════════════ */
const SK = 'leuven-v2';
let ST = JSON.parse(localStorage.getItem(SK) || '{}');
let curFilter = 'all';

function save() { localStorage.setItem(SK, JSON.stringify(ST)); }
function gs(id) { return ST[id] || { sent:false, replied:false, booked:false, lang:'en_short', name:'' }; }

/* ═══════════════ TABS ═══════════════ */
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
}

/* ═══════════════ QUICK TEMPLATES ═══════════════ */
function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.icp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuick();
}

function renderQuick() {
  const items = curFilter === 'all' ? QUICK : QUICK.filter(q => q.icp === curFilter);
  document.getElementById('s-total').textContent = items.length;

  let sent=0, replied=0, booked=0;
  QUICK.forEach(q => {
    const s = gs(q.id);
    if(s.sent) sent++;
    if(s.replied) replied++;
    if(s.booked) booked++;
  });
  document.getElementById('s-sent').textContent = sent;
  document.getElementById('s-replied').textContent = replied;
  document.getElementById('s-booked').textContent = booked;

  document.getElementById('quick-grid').innerHTML = items.map(q => {
    const s = gs(q.id);
    const msg = s.lang === 'nl' ? q.nl : s.lang === 'en_short' ? q.en_short : q.en;
    const cardCls = s.booked ? 'card is-booked' : s.sent ? 'card is-sent' : 'card';
    return `<div class="${cardCls}" id="card-${q.id}">
      <div class="card-head">
        <div class="badges">
          <span class="icp-tag ${q.icpCls}">${q.icpLabel}</span>
          <span class="persona-name">${q.persona}</span>
        </div>
        <div class="lang-sw">
          <button class="${s.lang==='en'?'active':''}" onclick="setLang('${q.id}','en')" title="Full EN">EN</button>
          <button class="${s.lang==='en_short'?'active':''}" onclick="setLang('${q.id}','en_short')" title="Short EN">EN↓</button>
          <button class="${s.lang==='nl'?'active':''}" onclick="setLang('${q.id}','nl')">NL</button>
        </div>
      </div>
      <div class="card-name">
        <input class="name-input" type="text" placeholder="→ Contact name" value="${esc(s.name||'')}" oninput="setName('${q.id}',this.value)">
      </div>
      <div class="card-msg">
        <div class="msg-text" id="msg-${q.id}">${esc(msg)}</div>
      </div>
      <div class="card-foot">
        <button class="copy-btn" id="cb-${q.id}" onclick="doCopy('${q.id}','cb-')">📋 Copy</button>
        <div class="checks">
          <label class="chk">
            <input type="checkbox" ${s.sent?'checked':''} onchange="togChk('${q.id}','sent',this.checked)">
            <span>Sent</span>
          </label>
          <label class="chk">
            <input type="checkbox" ${s.replied?'checked':''} onchange="togChk('${q.id}','replied',this.checked)">
            <span>Replied</span>
          </label>
          <label class="chk booked-chk">
            <input type="checkbox" ${s.booked?'checked':''} onchange="togChk('${q.id}','booked',this.checked)">
            <span>☕ Booked</span>
          </label>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLang(id, lang) {
  if(!ST[id]) ST[id] = gs(id);
  ST[id].lang = lang;
  save(); renderQuick();
}
function setName(id, name) {
  if(!ST[id]) ST[id] = gs(id);
  ST[id].name = name;
  save();
}
function togChk(id, field, val) {
  if(!ST[id]) ST[id] = gs(id);
  ST[id][field] = val;
  save();
  const card = document.getElementById('card-'+id);
  if(card) {
    const s = ST[id];
    card.className = s.booked ? 'card is-booked' : s.sent ? 'card is-sent' : 'card';
  }
  renderQuick();
}

function doCopy(id, prefix) {
  const isScript = prefix === 'sc-';
  let text;
  if(isScript) {
    const sc = SCRIPTS.find(s => s.id === id);
    const lang = (ST[id]||{}).slang || 'en';
    text = lang === 'nl' ? sc.nl : sc.en;
  } else {
    const q = QUICK.find(x => x.id === id);
    const s = gs(id);
    text = s.lang === 'nl' ? q.nl : s.lang === 'en_short' ? q.en_short : q.en;
  }
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  });
  const btn = document.getElementById(prefix + id);
  if(btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
  }
  toast('Copied to clipboard');
}

/* ═══════════════ FULL SCRIPTS ═══════════════ */
function renderScripts() {
  document.getElementById('scripts-grid').innerHTML = SCRIPTS.map(sc => {
    const slang = (ST[sc.id]||{}).slang || 'en';
    const msg = slang === 'nl' ? sc.nl : sc.en;
    return `<div class="script-card" id="scard-${sc.id}">
      <div class="script-head">
        <div>
          <div class="script-title">${sc.title}</div>
          <div class="script-desc">${sc.desc}</div>
        </div>
        <div class="script-lang">
          <button class="${slang==='en'?'active':''}" onclick="setSLang('${sc.id}','en')">EN</button>
          <button class="${slang==='nl'?'active':''}" onclick="setSLang('${sc.id}','nl')">NL</button>
        </div>
      </div>
      <div class="script-body">
        <div class="script-msg" id="smsg-${sc.id}">${esc(msg)}</div>
      </div>
      <div class="script-foot">
        <button class="script-copy" id="sc-${sc.id}" onclick="doCopy('${sc.id}','sc-')">📋 Copy message</button>
      </div>
    </div>`;
  }).join('');
}

function setSLang(id, lang) {
  if(!ST[id]) ST[id] = {};
  ST[id].slang = lang;
  save(); renderScripts();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ═══════════════ INIT ═══════════════ */
renderQuick();
renderScripts();
</script>
